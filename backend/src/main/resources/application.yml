server:
  port: 8080
  servlet:
    context-path: /api

spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:mysql://localhost:3306/community_activity?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:6227262003lhb@}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true                    # ← 改成true，打印SQL
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

# JWT 配置
jwt:
  secret: community-activity-platform-secret-key-2024-very-long-and-secure
  expiration: 86400000
  refresh-expiration: 604800000

# 文件上传路径
upload:
  path: uploads/
  base-url: http://localhost:8080/api/files/

# 推荐算法配置
recommendation:
  cf-enable-threshold: 20          # 提高CF触发门槛，避免数据稀疏时引入噪声
  top-k-users: 30                  # Top-30 相似用户
  top-n-activities: 10
  time-decay-factor: 0.005        # 调整衰减速度，更平缓
  cache-ttl: 3600                  # 缓存1小时
  # CB模块权重配置
  cb-tag-weight: 0.75              # 标签相似度权重
  cb-quality-weight: 0.25          # 活动质量分权重

logging:
  level:
    com.community: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG         # ← 打印SQL语句
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE  # ← 打印SQL参数
