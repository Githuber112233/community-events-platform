<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 邻里时光</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #FAFAF7;
      --bg-card: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #666666;
      --text-muted: #999999;
      --border-color: #E8E8E3;
      --accent-green: #2D7D46;
      --accent-green-hover: #246538;
      --accent-green-light: #E8F5EC;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
    }

    /* 左侧品牌区 */
    .brand-section {
      flex: 1;
      background: linear-gradient(135deg, #2D7D46 0%, #3A9B5A 50%, #4CAF50 100%);
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .brand-section::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 80%;
      height: 200%;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      transform: rotate(-15deg);
    }

    .brand-content {
      position: relative;
      z-index: 1;
      max-width: 400px;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .brand-logo-icon {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
    }

    .brand-logo-text {
      color: white;
      font-size: 24px;
      font-weight: 600;
    }

    .brand-tagline {
      color: white;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 20px;
    }

    .brand-desc {
      color: rgba(255,255,255,0.8);
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .brand-features {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .brand-feature {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,0.9);
      font-size: 15px;
    }

    .brand-feature-icon {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 右侧登录区 */
    .login-section {
      width: 480px;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-header {
      margin-bottom: 40px;
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* 表单样式 */
    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 15px;
      color: var(--text-primary);
      background: var(--bg-card);
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent-green);
      box-shadow: 0 0 0 3px rgba(45, 125, 70, 0.1);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .input-with-icon {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .input-with-icon .form-input {
      padding-left: 44px;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
    }

    .password-toggle:hover {
      color: var(--text-secondary);
    }

    /* 选项行 */
    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .remember-me input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent-green);
    }

    .forgot-link {
      font-size: 14px;
      color: var(--accent-green);
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    /* 登录按钮 */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent-green);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-login:hover {
      background: var(--accent-green-hover);
    }

    /* 分隔符 */
    .divider {
      display: flex;
      align-items: center;
      margin: 28px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    .divider-text {
      padding: 0 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* 社交登录 */
    .social-login {
      display: flex;
      gap: 12px;
    }

    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: var(--bg-card);
      font-size: 14px;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-social:hover {
      background: var(--bg-primary);
      border-color: var(--text-muted);
    }

    /* 注册提示 */
    .register-prompt {
      text-align: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }

    .register-prompt p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .register-prompt a {
      color: var(--accent-green);
      text-decoration: none;
      font-weight: 500;
    }

    .register-prompt a:hover {
      text-decoration: underline;
    }

    /* 响应式 */
    @media (max-width: 900px) {
      body {
        flex-direction: column;
      }
      
      .brand-section {
        padding: 40px 24px;
        min-height: auto;
      }
      
      .brand-tagline {
        font-size: 24px;
      }
      
      .brand-features {
        display: none;
      }
      
      .login-section {
        width: 100%;
        padding: 40px 24px;
      }
    }
  </style>
</head>
<body>
  <!-- 左侧品牌区 -->
  <div class="brand-section">
    <div class="brand-content">
      <div class="brand-logo">
        <div class="brand-logo-icon">邻</div>
        <span class="brand-logo-text">邻里时光</span>
      </div>
      
      <h1 class="brand-tagline">和邻居一起，<br>发现社区里的精彩</h1>
      
      <p class="brand-desc">
        加入身边的兴趣小组，参加社区活动，找到志同道合的朋友。让周末不再无聊，让社区更有温度。
      </p>
      
      <div class="brand-features">
        <div class="brand-feature">
          <div class="brand-feature-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
          </div>
          <span>认识志同道合的邻居</span>
        </div>
        <div class="brand-feature">
          <div class="brand-feature-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect>
              <line x1="16" x2="16" y1="2" y2="6"></line>
              <line x1="8" x2="8" y1="2" y2="6"></line>
              <line x1="3" x2="21" y1="10" y2="10"></line>
            </svg>
          </div>
          <span>发现丰富的社区活动</span>
        </div>
        <div class="brand-feature">
          <div class="brand-feature-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
          </div>
          <span>分享你的兴趣和技能</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 右侧登录区 -->
  <div class="login-section">
    <div class="login-header">
      <h2 class="login-title">欢迎回来</h2>
      <p class="login-subtitle">登录后探索更多社区精彩</p>
    </div>

    <form>
      <div class="form-group">
        <label class="form-label">用户名</label>
        <div class="input-with-icon">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input type="text" class="form-input" placeholder="请输入用户名">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">密码</label>
        <div class="input-with-icon">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" class="form-input" placeholder="请输入密码" id="password">
          <button type="button" class="password-toggle" onclick="togglePassword()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye-icon">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox">
          <span>记住登录状态</span>
        </label>
        <a href="#" class="forgot-link">忘记密码？</a>
      </div>

      <button type="submit" class="btn-login">登 录</button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">或</span>
      <div class="divider-line"></div>
    </div>

    <div class="social-login">
      <button class="btn-social">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span>Google</span>
      </button>
      <button class="btn-social">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#07C160">
          <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348z"/>
        </svg>
        <span>微信</span>
      </button>
    </div>

    <div class="register-prompt">
      <p>还没有账号？<a href="#">立即注册</a></p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    }
  </script>
</body>
</html>
