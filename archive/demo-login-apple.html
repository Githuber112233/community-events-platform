<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 邻里</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #1d1d1f;
      --gray: #86868b;
      --light-gray: #f5f5f7;
      --gold: #d4af37;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--light-gray);
      color: var(--black);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 20px;
      font-weight: 600;
      color: var(--black);
      text-decoration: none;
    }

    .logo svg {
      width: 24px;
      height: 24px;
    }

    .header-link {
      font-size: 13px;
      color: var(--black);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.3s;
    }

    .header-link:hover {
      opacity: 1;
    }

    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--white);
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--gold) 0%, #f0d78c 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .login-icon svg {
      width: 28px;
      height: 28px;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--black);
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 15px;
      color: var(--gray);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--black);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d2d2d7;
      border-radius: 12px;
      font-size: 16px;
      color: var(--black);
      background: var(--white);
      transition: all 0.3s;
      font-family: inherit;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
    }

    .form-input::placeholder {
      color: #86868b;
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--gray);
      cursor: pointer;
      padding: 4px;
    }

    .password-toggle:hover {
      color: var(--black);
    }

    .password-toggle svg {
      width: 18px;
      height: 18px;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--gray);
      cursor: pointer;
    }

    .checkbox-label input {
      width: 16px;
      height: 16px;
      accent-color: var(--gold);
    }

    .link {
      font-size: 14px;
      color: var(--gold);
      text-decoration: none;
      transition: color 0.3s;
    }

    .link:hover {
      color: var(--black);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--black);
      color: var(--white);
    }

    .btn-primary:hover {
      background: #000;
      transform: scale(1.01);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 28px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: #d2d2d7;
    }

    .divider-text {
      padding: 0 16px;
      font-size: 13px;
      color: var(--gray);
    }

    .social-buttons {
      display: flex;
      gap: 12px;
    }

    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: var(--white);
      border: 1px solid #d2d2d7;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      color: var(--black);
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .btn-social:hover {
      background: var(--light-gray);
    }

    .btn-social svg {
      width: 18px;
      height: 18px;
    }

    .register-prompt {
      text-align: center;
      margin-top: 32px;
      padding-top: 28px;
      border-top: 1px solid #e5e5e5;
    }

    .register-prompt p {
      font-size: 14px;
      color: var(--gray);
    }

    .register-prompt a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
    }

    .register-prompt a:hover {
      text-decoration: underline;
    }

    .footer {
      padding: 24px 40px;
      text-align: center;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 12px;
    }

    .footer-links a {
      font-size: 12px;
      color: var(--gray);
      text-decoration: none;
    }

    .footer-links a:hover {
      color: var(--black);
    }

    .footer-copyright {
      font-size: 11px;
      color: var(--gray);
    }

    @media (max-width: 480px) {
      .header {
        padding: 16px 20px;
      }

      .login-card {
        padding: 36px 24px;
        border-radius: 16px;
      }

      .social-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <a href="#" class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>邻里</span>
      </a>
      <a href="#" class="header-link">需要帮助?</a>
    </header>

    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-header">
          <div class="login-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <h1>欢迎回来</h1>
          <p>登录探索更多社区精彩</p>
        </div>

        <form>
          <div class="form-group">
            <label class="form-label">用户名</label>
            <input type="text" class="form-input" placeholder="输入用户名">
          </div>

          <div class="form-group">
            <label class="form-label">密码</label>
            <div class="password-wrapper">
              <input type="password" class="form-input" id="password" placeholder="输入密码">
              <button type="button" class="password-toggle" onclick="togglePassword()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye-icon">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="checkbox-label">
              <input type="checkbox">
              <span>记住我</span>
            </label>
            <a href="#" class="link">忘记密码?</a>
          </div>

          <button type="submit" class="btn btn-primary">登录</button>
        </form>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">或</span>
          <div class="divider-line"></div>
        </div>

        <div class="social-buttons">
          <button class="btn-social">
            <svg viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span>Google</span>
          </button>
          <button class="btn-social">
            <svg viewBox="0 0 24 24" fill="#07C160">
              <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348z"/>
            </svg>
            <span>微信</span>
          </button>
        </div>

        <div class="register-prompt">
          <p>还没有账号? <a href="#">立即注册</a></p>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-links">
        <a href="#">隐私政策</a>
        <a href="#">使用条款</a>
        <a href="#">法律信息</a>
        <a href="#">联系我们</a>
      </div>
      <p class="footer-copyright">Copyright 2025 邻里. All rights reserved.</p>
    </footer>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    }
  </script>
</body>
</html>
